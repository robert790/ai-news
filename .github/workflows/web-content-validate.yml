name: Web content validation

on:
  pull_request:
    paths:
      - "web/src/content/prompts/**"
      - "web/scripts/validate-prompt-content**"
      - "web/package.json"
      - "web/package-lock.json"
      - "web/tsconfig.json"
      - ".github/workflows/web-content-validate.yml"
  push:
    branches: [main]
    paths:
      - "web/src/content/prompts/**"
      - "web/scripts/validate-prompt-content**"
      - "web/package.json"
      - "web/package-lock.json"
      - "web/tsconfig.json"
      - ".github/workflows/web-content-validate.yml"

concurrency:
  group: web-content-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Validate canonical prompt content
        working-directory: web
        run: npm run content:validate

      - name: Run prompt content tests
        working-directory: web
        run: npm run content:test

      - name: Type-check
        working-directory: web
        run: npx tsc --noEmit

      - name: Lint
        working-directory: web
        run: npm run lint