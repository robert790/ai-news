name: Deploy to Hugging Face Space

# Auto-sync GitHub `main` to the Hugging Face Space after every merge.
# Source of truth is GitHub. This workflow mirrors `main` → HF.
#
# Required repo secret: HF_TOKEN
#   - HF fine-grained write token, scoped to the Space only
#   - Set in repo Settings → Secrets and variables → Actions
#   - Never printed, never stored in this repo or on the VPS
#
# Manual `git push huggingface main` from Robert's workstation
# remains an emergency fallback — see DEPLOY.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-hf:
    name: Sync main to HF Space
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Never run on pull_request — pushes to main only. PR CI lives
    # in ci.yml. This separation keeps the HF deploy from racing PR
    # checks and avoids burning HF quota on every PR push.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Verify HF_TOKEN secret is present
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [[ -z "${HF_TOKEN}" ]]; then
            echo "::error::HF_TOKEN secret is not set. Add it in repo Settings → Secrets and variables → Actions before merging." >&2
            exit 1
          fi
          # Mask the token so it never appears in logs even on error.
          echo "::add-mask::${HF_TOKEN}"
          echo "✓ HF_TOKEN present (value masked from logs)"

      - name: Checkout repository
        # huggingface/hub-sync expects files on disk in the runner
        # workdir. Without this step the workdir is empty, the action's
        # `find "${SRC_DIR}" -type f ...` returns 0, and it exits with
        # "No files to upload. Check that your repository has files."
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PR #30 (final attempt): replace hub-sync + hf upload with git push.
      # Both the old huggingface/hub-sync@v0.1.0 action AND `hf upload`
      # internally hit the HF repos/create endpoint (the action explicitly,
      # the CLI implicitly via the upload API handshake). HF's repos/create
      # is permanently blocked for this Space:
      #   - streamlit SDK rejected as invalid (HTTP 400, SDK whitelist
      #     is gradio|docker|static)
      #   - gradio/docker SDK mismatch against the existing streamlit Space
      #     on free cpu-basic returns HTTP 402 (treated as upgrade request)
      # No SDK value satisfies the repos/create call. Git push bypasses
      # this entirely: it pushes commits to the existing Space repository
      # without touching repos/create at all. Same outcome (file sync to
      # an existing Space) via a different transport.
      - name: Sync main to Hugging Face Space (git push)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: vrobert94/ai-news
        run: |
          set -euo pipefail

          DEPLOY_DIR="$(mktemp -d)"
          trap 'rm -rf "${DEPLOY_DIR}"' EXIT

          echo "Cloning existing HF Space repository..."
          git clone "https://x-access-token:${HF_TOKEN}@huggingface.co/spaces/${HF_REPO_ID}" "${DEPLOY_DIR}"

          echo "Syncing repository files, excluding GitHub workflow internals..."
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            ./ "${DEPLOY_DIR}/"

          cd "${DEPLOY_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi

          git commit -m "Sync from GitHub ${GITHUB_SHA}"
          git push origin HEAD:main

          echo "✓ Git push sync completed successfully"
          echo "View at: https://huggingface.co/spaces/${HF_REPO_ID}"