name: Deploy to Hugging Face Space

# Auto-sync GitHub `main` to the Hugging Face Space after every merge.
# Source of truth is GitHub. This workflow mirrors `main` → HF.
#
# Required repo secret: HF_TOKEN
#   - HF fine-grained write token, scoped to the Space only
#   - Set in repo Settings → Secrets and variables → Actions
#   - Never printed, never stored in this repo or on the VPS
#
# Manual `git push huggingface main` from Robert's workstation
# remains an emergency fallback — see DEPLOY.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-hf:
    name: Sync main to HF Space
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Never run on pull_request — pushes to main only. PR CI lives
    # in ci.yml. This separation keeps the HF deploy from racing PR
    # checks and avoids burning HF quota on every PR push.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Verify HF_TOKEN secret is present
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [[ -z "${HF_TOKEN}" ]]; then
            echo "::error::HF_TOKEN secret is not set. Add it in repo Settings → Secrets and variables → Actions before merging." >&2
            exit 1
          fi
          # Mask the token so it never appears in logs even on error.
          echo "::add-mask::${HF_TOKEN}"
          echo "✓ HF_TOKEN present (value masked from logs)"

      - name: Checkout repository
        # huggingface/hub-sync expects files on disk in the runner
        # workdir. Without this step the workdir is empty, the action's
        # `find "${SRC_DIR}" -type f ...` returns 0, and it exits with
        # "No files to upload. Check that your repository has files."
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PR #30 follow-up: install uv on the runner. The direct upload step
      # calls `uvx hf upload`, but ubuntu-latest does not ship uv/uvx
      # by default. The old hub-sync action bootstrapped uv internally;
      # our inline replacement must install uv explicitly so `uvx` is
      # on PATH when the upload step runs.
      - name: Install uv for HF CLI upload
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync main to Hugging Face Space (direct upload)
        # PR #30 fix: drop huggingface/hub-sync@v0.1.0.
        # The action unconditionally runs `hf repos create --space-sdk
        # "${SPACE_SDK}"` before the upload step (action.yml line 87-99),
        # with no way to skip creation. HF's repos create API has dropped
        # `streamlit` from the SDK whitelist (streamlit SDK is deprecated;
        # HF wants Streamlit Spaces on the docker SDK now). Our existing
        # Space vrobert94/ai-news was created as a streamlit Space, so
        # no SDK value works through the action:
        #   - streamlit -> HTTP 400 "Invalid option: expected one of
        #                  gradio|docker|static"
        #   - docker/gradio -> HTTP 402 (SDK mismatch against an existing
        #                       free cpu-basic Space = upgrade request =
        #                       PRO subscription required)
        # Fix: skip repo creation entirely. `hf upload` does not validate
        # the SDK and works against any existing repo the token can write
        # to. Same upload semantics as the previous hub-sync action's
        # upload step (--exclude, --delete, --commit-message).
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: vrobert94/ai-news
          REPO_TYPE: space
        run: |
          set -euo pipefail
          FILE_COUNT=$(find . -type f ! -path '*/.git/*' ! -path '*/.github/*' | wc -l | tr -d ' ')
          if [[ ${FILE_COUNT} -eq 0 ]]; then
            echo "::error::No files to upload. Check that your repository has files."
            exit 1
          fi
          echo "Uploading ${FILE_COUNT} files to ${HF_REPO_ID} (${REPO_TYPE})..."
          uvx hf upload \
            "${HF_REPO_ID}" \
            . \
            --repo-type "${REPO_TYPE}" \
            --exclude=".git*" \
            --exclude=".github*" \
            --delete="*" \
            --commit-message="Sync from GitHub via direct upload (PR #30)"
          echo "✓ Sync completed successfully"
          echo "View at: https://huggingface.co/spaces/${HF_REPO_ID}"